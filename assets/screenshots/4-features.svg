<svg width="1700" height="956" viewBox="0 0 1700 956" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1700" height="956" fill="#f7faf9"/>

  <text x="850" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="60" font-weight="800" fill="#0E7C7B">Det kan appen</text>
  <text x="850" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" fill="#6b7785">Fuld dækning af e-conomics REST API — i naturligt sprog</text>

  <!-- 2x3 feature cards -->
  <g font-family="system-ui, sans-serif">
    <g transform="translate(160,290)">
      <rect width="450" height="180" rx="20" fill="#ffffff" stroke="#e4ece9" stroke-width="2"/>
      <rect x="34" y="40" width="44" height="44" rx="12" fill="#1FB6A6"/>
      <text x="100" y="62" font-size="26" font-weight="700" fill="#1f2a37">Kunder &amp; leverandører</text>
      <text x="100" y="104" font-size="23" fill="#6b7785">Søg, opret og opdatér</text>
      <text x="100" y="136" font-size="23" fill="#6b7785">i naturligt sprog</text>
    </g>
    <g transform="translate(630,290)">
      <rect width="450" height="180" rx="20" fill="#ffffff" stroke="#e4ece9" stroke-width="2"/>
      <rect x="34" y="40" width="44" height="44" rx="12" fill="#1FB6A6"/>
      <text x="100" y="62" font-size="26" font-weight="700" fill="#1f2a37">Fakturaer &amp; ordrer</text>
      <text x="100" y="104" font-size="23" fill="#6b7785">Kladder, bogførte,</text>
      <text x="100" y="136" font-size="23" fill="#6b7785">ordrer og tilbud</text>
    </g>
    <g transform="translate(1100,290)">
      <rect width="450" height="180" rx="20" fill="#ffffff" stroke="#e4ece9" stroke-width="2"/>
      <rect x="34" y="40" width="44" height="44" rx="12" fill="#1FB6A6"/>
      <text x="100" y="62" font-size="26" font-weight="700" fill="#1f2a37">Kassekladder &amp; konti</text>
      <text x="100" y="104" font-size="23" fill="#6b7785">Bogføring, konti,</text>
      <text x="100" y="136" font-size="23" fill="#6b7785">moms og valuta</text>
    </g>
    <g transform="translate(160,500)">
      <rect width="450" height="180" rx="20" fill="#ffffff" stroke="#e4ece9" stroke-width="2"/>
      <rect x="34" y="40" width="44" height="44" rx="12" fill="#1FB6A6"/>
      <text x="100" y="62" font-size="26" font-weight="700" fill="#1f2a37">Hele API'et</text>
      <text x="100" y="104" font-size="23" fill="#6b7785">Universelt request-værktøj</text>
      <text x="100" y="136" font-size="23" fill="#6b7785">til alle endpoints</text>
    </g>
    <g transform="translate(630,500)">
      <rect width="450" height="180" rx="20" fill="#ffffff" stroke="#e4ece9" stroke-width="2"/>
      <rect x="34" y="40" width="44" height="44" rx="12" fill="#1FB6A6"/>
      <text x="100" y="62" font-size="26" font-weight="700" fill="#1f2a37">Hurtig opsætning</text>
      <text x="100" y="104" font-size="23" fill="#6b7785">Godkend i browseren —</text>
      <text x="100" y="136" font-size="23" fill="#6b7785">ingen egen app nødvendig</text>
    </g>
    <g transform="translate(1100,500)">
      <rect width="450" height="180" rx="20" fill="#ffffff" stroke="#e4ece9" stroke-width="2"/>
      <rect x="34" y="40" width="44" height="44" rx="12" fill="#1FB6A6"/>
      <text x="100" y="62" font-size="26" font-weight="700" fill="#1f2a37">Kører lokalt</text>
      <text x="100" y="104" font-size="23" fill="#6b7785">Open source via stdio</text>
      <text x="100" y="136" font-size="23" fill="#6b7785">i din egen MCP-klient</text>
    </g>
  </g>

  <text x="850" y="800" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#9aa5b1">Virker med Claude · Cursor · enhver MCP-kompatibel klient</text>
</svg>
